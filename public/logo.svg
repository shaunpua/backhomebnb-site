<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White circle background -->
  <circle cx="100" cy="100" r="96" fill="white"/>

  <!-- Purple dotted border — 32 dots on radius 88 -->
  <g fill="#7B2957">
    <circle cx="100" cy="12" r="3.6"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(11.25 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(22.5 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(33.75 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(45 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(56.25 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(67.5 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(78.75 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(90 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(101.25 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(112.5 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(123.75 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(135 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(146.25 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(157.5 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(168.75 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(180 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(191.25 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(202.5 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(213.75 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(225 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(236.25 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(247.5 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(258.75 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(270 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(281.25 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(292.5 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(303.75 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(315 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(326.25 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(337.5 100 100)"/>
    <circle cx="100" cy="12" r="3.6" transform="rotate(348.75 100 100)"/>
  </g>

  <!-- BACK HOME arched text along top arc -->
  <defs>
    <path id="topArc" d="M 28,100 A 72,72 0 0,1 172,100"/>
  </defs>
  <text fill="#2D6A4F" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" font-weight="600" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">BACK HOME</textPath>
  </text>

  <!-- House icon (gold line art) -->
  <g stroke="#C4993A" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Roof left slope -->
    <line x1="100" y1="56" x2="46" y2="91"/>
    <!-- Roof right slope -->
    <line x1="100" y1="56" x2="154" y2="91"/>
    <!-- Eave horizontal bar -->
    <line x1="46" y1="91" x2="154" y2="91"/>
    <!-- Left wall -->
    <line x1="62" y1="91" x2="62" y2="142"/>
    <!-- Right wall -->
    <line x1="138" y1="91" x2="138" y2="142"/>
    <!-- Bottom -->
    <line x1="62" y1="142" x2="138" y2="142"/>
    <!-- Door (centered, flush with bottom) -->
    <rect x="86" y="114" width="28" height="28" stroke-width="4"/>
  </g>

  <!-- AIRBNB bold text -->
  <text x="100" y="175" fill="#1C5F3A" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900" text-anchor="middle" letter-spacing="3.5">AIRBNB</text>
</svg>
